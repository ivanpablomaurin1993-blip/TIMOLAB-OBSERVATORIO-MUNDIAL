<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TIMOLAB LAB</title>

<style>

body{
background:#000;
color:#00ff9c;
font-family:Courier New;
padding:40px;
}

.question{
margin-top:40px;
font-size:22px;
}

textarea{
width:100%;
height:120px;
background:#111;
color:#fff;
border:1px solid #00ff9c;
padding:10px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#000;
color:#00ff9c;
border:1px solid #00ff9c;
cursor:pointer;
}

</style>
</head>

<body>

<h1>TIMOLAB INTERACTION NODE</h1>

<div class="question">
¿Sabes que estás siendo observada?
</div>

<textarea id="respuesta"></textarea>

<button onclick="enviar()">Transmitir</button>

<script>

async function enviar(){

const texto = document.getElementById("respuesta").value;

await fetch('/api/register_agent',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({respuesta:texto})
});

alert("Registro almacenado");

}

</script>

</body>
</html>
